<div id="hotel-list"></div>

<script>
const hotels = [
  {
    name: "UB Grand Hotel",
    location: "Ulaanbaatar",
    price: "$80",
    type: "Hotel",
    image: "https://via.placeholder.com/300"
  },
  {
    name: "Nomad Guesthouse",
    location: "Ulaanbaatar",
    price: "$25",
    type: "Guesthouse",
    image: "https://via.placeholder.com/300"
  }
];

const container = document.getElementById("hotel-list");

hotels.forEach(hotel => {
  container.innerHTML += `
    <div class="card">
      <img src="${hotel.image}" width="100%">
      <h3>${hotel.name}</h3>
      <p>${hotel.location}</p>
      <p>From ${hotel.price}</p>
      <button>View Details</button>
    </div>
  `;
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Your Property - Discover Mongolia</title>
</head>
<body>

<h2>Add Your Property</h2>

<form name="property" method="POST" data-netlify="true">

  <input type="hidden" name="form-name" value="property">

  <h3>Basic Info</h3>

  <input type="text" name="property_name" placeholder="Property Name" required><br><br>

  <select name="type">
    <option>Hotel</option>
    <option>Guesthouse</option>
    <option>Ger Camp</option>
  </select><br><br>

  <input type="text" name="location" placeholder="City / Province" required><br><br>
  <input type="text" name="map" placeholder="Google Map Link"><br><br>

  <input type="text" name="phone" placeholder="Phone"><br><br>
  <input type="text" name="whatsapp" placeholder="WhatsApp"><br><br>
  <input type="email" name="email" placeholder="Email"><br><br>

  <h3>Description (English)</h3>

  <textarea name="description" placeholder="Short description..." rows="5"></textarea><br><br>

  <h3>Pricing</h3>

  <input type="text" name="price" placeholder="Starting price (USD or MNT)"><br><br>

  <h3>Facilities</h3>

  <label><input type="checkbox" name="wifi"> WiFi</label>
  <label><input type="checkbox" name="shower"> Shower</label>
  <label><input type="checkbox" name="restaurant"> Restaurant</label>
  <label><input type="checkbox" name="pickup"> Airport Pickup</label><br><br>

  <h3>Images</h3>

  <input type="file" name="images" multiple><br><br>

  <button type="submit">Submit Property</button>

</form>

</body>
</html>
